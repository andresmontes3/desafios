<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <meta charset="utf-8" />
    <title>Dev Geek Portal</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
       <a class="p-2 navbar-brand" href="#">Dev Geek Portal</a>
       <div class="d-flex align-items-center gap-3 ms-auto p-2">
           <form class="my-2 my-lg-0">
               <input id="search-input" class="form-control me-2" type="search" placeholder="Type a character name...">
           </form>
           <button href="#" class="btn btn-primary btn-md active" id="previous-btn" role="button" aria-pressed="true"><i class="bi bi-caret-left-fill"></i> Previous Page</button>
           <button href="#" class="btn btn-primary btn-md active" id="next-btn" role="button" aria-pressed="true">Next Page <i class="bi bi-caret-right-fill"></i></button>
       </div>
    </nav>

    <div id="loading" class="text-center" style="display:none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row" id="characterList"> </div>
    </div>

    <div class="modal fade" id="modal-char" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modal-char-title"></h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="modal-char-body">

                </div>

                <div class="modal-footer" id="modal-char-footer">
                    <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Close
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script>

        let currentPage = 1;
        let totalPages = 1;
        let searchQuery = "";

        function openModal(title, description) {

            document.getElementById("modal-char-title").innerText = title;
            document.getElementById("modal-char-body").innerText = description;

            const modal = new bootstrap.Modal(document.getElementById('modal-char'));
            modal.show();
        }


        $(document).on("click", ".modal-opener", function () {

            const name = $(this).data("name");
            const species = $(this).data("species");
            const status = $(this).data("status");
            const gender = $(this).data("gender");
            const origin = $(this).data("origin");
            const location = $(this).data("location");

            const description =
                "Species: " + species + "\n" +
                "Status: " + status + "\n" +
                "Gender: " + gender + "\n" +
                "Origin: " + origin + "\n" +
                "Location: " + location;

            openModal(name, description);
        });

        function getCharactersData() {

            $("#characterList").empty();
            $("#loading").show();

            $.ajax({
                url: `https://rickandmortyapi.com/api/character?page=${currentPage}&name=${searchQuery}`,
                type: "GET",
                dataType: "json",
                success: function (data) {

                    totalPages = data.info.pages;

                    $.each(data.results, function (i, character) {
                        $("#characterList").append(
                            `<div class="col-12 col-sm-6 col-md-4 col-lg-3">
                          <div class="card h-100 char-card" data-name="${character.name}">
                            <img class="card-img-top" src=${character.image} alt=${character.name}>
                            <div class="card-body d-flex flex-column">
                              <h5 class="card-title"><b>${character.name}</b></h5>
                              <p class="card-text">${character.species}</br>
                                                      ${character.status}</br>
                              <button class="btn btn-primary mt-auto modal-opener"
                              data-name="${character.name}"
                              data-species="${character.species}"
                              data-status="${character.status}"
                              data-gender="${character.gender}"
                              data-origin="${character.origin.name}"
                              data-location="${character.location.name}"><i class="bi bi-search"></i>  See more</button>
                            </div>
                          </div>
                          </div>
                          `);
                    });

                    $("#loading").hide();

                },
                error: function (ex) {
                    console.log("An error has occurred while trying to retrieve data.", ex);
                    $("#loading").hide();
                }
            });

        }


        $("#search-input").on("input", function () {

            searchQuery = $(this).val().toLowerCase();
            currentPage = 1;

            getCharactersData();
        });

        $("#previous-btn").on("click", function () {
            if (currentPage == 1) {
                currentPage = totalPages;
            }
            else {
                currentPage--;
            }

            getCharactersData();
        });

        $("#next-btn").on("click", function () {
            if (currentPage == totalPages) {
                currentPage = 1;
            }
            else {
                currentPage++;
            }

            getCharactersData();
        });

        $(document).ready(function () {
            getCharactersData();
        });

    </script>
</body>
</html>
